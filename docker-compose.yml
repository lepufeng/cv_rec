version: "3.9"

# 开发期可选：用 SQLite 直接跑也行，无需启动此栈
# docker compose up -d 启动 postgres，然后将 .env 中 DATABASE_URL 改为
# postgresql+asyncpg://dev:dev@localhost:5432/cv_rec
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cv_rec
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
